# =============================================================================
# OmniFile Docker Compose
# =============================================================================
#
# تشغيل كامل للنظام مع:
# - API Server
# - Database
# - Redis (Cache)
# - MinIO (Object Storage)
# - Prometheus (Monitoring)
# - Grafana (Dashboards)

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # API Server
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile.api
    container_name: omnifile-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://omnifile:${DB_PASSWORD}@db:5432/omnifile
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=INFO
      - WORKERS=4
    depends_on:
      - db
      - redis
      - minio
    volumes:
      - api-logs:/app/logs
      - model-storage:/app/models
    networks:
      - omnifile-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: omnifile-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=omnifile
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=omnifile
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - omnifile-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnifile"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis Cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: omnifile-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - omnifile-network

  # ---------------------------------------------------------------------------
  # MinIO Object Storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: omnifile-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - omnifile-network

  # ---------------------------------------------------------------------------
  # Training Worker (GPU)
  # ---------------------------------------------------------------------------
  training:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile.training
    container_name: omnifile-training
    restart: "no"  # تشغيل يدوي
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - WANDB_API_KEY=${WANDB_API_KEY}
      - DATABASE_URL=postgresql://omnifile:${DB_PASSWORD}@db:5432/omnifile
    volumes:
      - training-data:/workspace/data
      - training-outputs:/workspace/outputs
      - training-checkpoints:/workspace/checkpoints
    networks:
      - omnifile-network
    profiles:
      - training  # لا يبدأ تلقائياً

  # ---------------------------------------------------------------------------
  # Monitoring - Prometheus
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: omnifile-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - omnifile-network

  # ---------------------------------------------------------------------------
  # Monitoring - Grafana
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: omnifile-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    networks:
      - omnifile-network
    depends_on:
      - prometheus

  # ---------------------------------------------------------------------------
  # Reverse Proxy - Traefik
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v2.10
    container_name: omnifile-traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt-data:/letsencrypt
    networks:
      - omnifile-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-data:
  redis-data:
  minio-data:
  api-logs:
  model-storage:
  training-data:
  training-outputs:
  training-checkpoints:
  prometheus-data:
  grafana-data:
  letsencrypt-data:

# =============================================================================
# Networks
# =============================================================================
networks:
  omnifile-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
