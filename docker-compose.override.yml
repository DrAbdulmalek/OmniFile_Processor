# =============================================================================
# Docker Compose Override for Development
# =============================================================================

version: '3.8'

services:
  api:
    build:
      target: builder
    volumes:
      - .:/app:cached
      - /app/node_modules
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - RELOAD=true
    command: uvicorn api_server_v2.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    ports:
      - "5432:5432"
    volumes:
      - ./init-scripts:/docker-entrypoint-initdb.d:ro

  redis:
    ports:
      - "6379:6379"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  # إضافة خدمات للتطوير
  mailhog:
    image: mailhog/mailhog:latest
    container_name: omnifile-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - omnifile-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: omnifile-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@omnifile.local
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - omnifile-network

volumes:
  pgadmin-data:
